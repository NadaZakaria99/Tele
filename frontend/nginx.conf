server {
    listen 3000;
    server_name _;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ → nbe-rag:8002
    location /api/ {
        proxy_pass         http://nbe-rag:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy /nbe-crops/ → nbe-minio:9000/nbe-crops/
    location ^~ /nbe-crops/ {
        proxy_pass         http://nbe-minio:9000/nbe-crops/;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy /nbe-pages/ → nbe-minio:9000/nbe-pages/
    location ^~ /nbe-pages/ {
        proxy_pass         http://nbe-minio:9000/nbe-pages/;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
