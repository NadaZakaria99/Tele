    <style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: #004a2d;
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background:
                radial-gradient(circle at 0% 0%, #004a2d 0%, transparent 50%),
                radial-gradient(circle at 100% 0%, #2b5c43 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #1a3a2a 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #5c7468 0%, transparent 50%),
                #d1d5db;
            filter: blur(80px);
            opacity: 0.8;
            animation: mesh-move 20s ease-in-out infinite alternate;
        }

        @keyframes mesh-move {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1) translate(2%, 2%);
            }
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .stagger-0 {
            animation-delay: 0.1s;
        }

        .stagger-1 {
            animation-delay: 0.2s;
            opacity: 0;
            animation: fadeIn 0.5s forwards 0.2s;
        }

        .stagger-2 {
            animation-delay: 0.3s;
            opacity: 0;
            animation: fadeIn 0.5s forwards 0.3s;
        }

        .stagger-3 {
            animation-delay: 0.4s;
            opacity: 0;
            animation: fadeIn 0.5s forwards 0.4s;
        }

        .stagger-4 {
            animation-delay: 0.5s;
            opacity: 0;
            animation: fadeIn 0.5s forwards 0.5s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .magnetic-card {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            perspective: 1000px;
            border-width: 2px;
        }

        .peer:checked+.magnetic-card,
        .magnetic-card:has(.peer:checked) {
            border-color: #00552c !important;
            box-shadow: 0 0 15px rgba(0, 85, 44, 0.15) !important;
        }

        .check-bounce {
            animation: elastic-bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes elastic-bounce {
            0% {
                transform: scale(0);
            }

            70% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .input-enhanced::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #00552c;
            transition: all 0.4s ease;
            transform: translateX(-50%);
        }

        .input-enhanced:focus-within::after {
            width: 100%;
        }

        .input-breathing:focus {
            box-shadow: 0 0 0 4px rgba(0, 85, 44, 0.1);
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                box-shadow: 0 0 0 4px rgba(0, 85, 44, 0.1);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(0, 85, 44, 0.2);
            }
        }

        .btn-morph {
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-morph.loading {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-left: auto;
            margin-right: auto;
            padding: 0;
            font-size: 0;
        }

        .btn-morph.loading .laser-scan {
            display: block;
        }

        .laser-scan {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #00552c;
        }

        .laser-line {
            position: absolute;
            width: 80%;
            height: 2px;
            background: #9af6b5;
            left: 10%;
            top: 10%;
            box-shadow: 0 0 10px #9af6b5;
            animation: scan-move 1.5s infinite ease-in-out;
        }

        @keyframes scan-move {
            0% {
                top: 10%;
            }

            50% {
                top: 85%;
            }

            100% {
                top: 10%;
            }
        }

        .scan-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
        }
    </style>

    <script>
        // Particle System
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Mouse Parallax effect
                if (mouse.x) {
                    let dx = mouse.x - canvas.width / 2;
                    let dy = mouse.y - canvas.height / 2;
                    this.x += dx * 0.001;
                    this.y += dy * 0.001;
                }

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();

                // Draw lines
                for (let j = index; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - dist / 150)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animateParticles);
        }

        init();
        animateParticles();

        // Magnetic Card Hover Effect
        const cards = document.querySelectorAll('.magnetic-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 10;
                const rotateY = -(x - centerX) / 20;

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });

        // Login Button Morphing
        const loginBtn = document.getElementById('login-btn');
        loginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loginBtn.classList.add('loading');
            loginBtn.querySelector('.btn-text').style.opacity = '0';

            // Redirect simulation after scan
            setTimeout(() => {
                // In a real app: window.location.href = '/dashboard';
                console.log("Logged in!");
                loginBtn.classList.remove('loading');
                loginBtn.querySelector('.btn-text').style.opacity = '1';
            }, 3000);
        });
    </script>


</body>
